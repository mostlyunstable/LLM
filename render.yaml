services:
  - type: keyvalue
    name: whatsapp-ai-redis
    plan: starter
    region: oregon

  - type: web
    name: whatsapp-ai-api
    runtime: docker
    plan: starter
    region: oregon
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "300"
      - key: OPENAI_REQUEST_TIMEOUT_SECONDS
        value: "20"

      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: TWILIO_VALIDATE_SIGNATURE
        value: "true"

      - key: ASYNC_REPLY
        value: "true"

      - key: MEMORY_BACKEND
        value: redis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: whatsapp-ai-redis
          property: connectionString
      - key: MEMORY_TTL_SECONDS
        value: "21600"
      - key: MEMORY_MAX_TURNS
        value: "8"
      - key: WHATSAPP_MAX_CHARS
        value: "700"
      - key: PER_SENDER_COOLDOWN_SECONDS
        value: "0.5"

      # Optional features (keep off by default)
      - key: RAG_ENABLED
        value: "false"
      - key: MEDIA_ENABLED
        value: "false"
